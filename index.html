<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0B3A6F">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/icon.svg">
<script type="importmap">
{ "imports": {
  "pdf-lib": "./vendor/pdf-lib.esm.min.js",
  "@pdf-lib/fontkit": "./vendor/fontkit.esm.min.js"
} }
</script>
<title>SkyPatrol · 산업안전점검</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="topbar" id="topbar">
  <button class="back" id="backBtn">‹</button>
  <div class="title" id="topTitle">SkyPatrol</div>
  <div class="branch-badge" id="branchBadge"></div>
</div>
<div class="screen active" id="screen-home"></div>
<div class="screen" id="screen-form"></div>
<div class="savebar" id="savebar" hidden></div>

<script type="module">
import { getConfig, setConfig, resolveAgencyDefaults } from './js/config.js'
import { resolveBranchLink } from './js/branchlink.js'
import { BRANCH_LINKS } from './config/branch-links.js'
import { renderHome } from './js/app.js'
import { renderForm } from './js/form-sheet.js'
import { saveDoc, getDoc, listByAgencyForm, listAll, listBySync, deleteDoc } from './js/store.js'
import { syncSave, flushPending } from './js/backend.js'
import { list as sharedList, getDoc as sharedGet, saveDoc as sharedSave } from './js/sharedstore.js'
import { nextStatus, STATUS, canSaveFinalPdf } from './js/docstatus.js'
import { nextRound } from './js/naming.js'
import { buildDocMeta } from './js/docname.js'
import { createSaveButton } from './js/components/savebadge.js'
import { FORMS } from './forms/index.js'
import { renderPdf as renderPdfCore } from './js/pdf-render.js'
import { loadRoster } from './js/roster.js'
import { expiredDocIds } from './js/retention.js'

const home = document.getElementById('screen-home')
const formScreen = document.getElementById('screen-form')
const savebar = document.getElementById('savebar')
const branchBadge = document.getElementById('branchBadge')
const backBtn = document.getElementById('backBtn')
const online = () => navigator.onLine
const now = () => new Date().toISOString()
const APPS = () => getConfig().APPS_SCRIPT_URL

// 저장: 공유모드(URL 설정)면 syncSave(로컬즉시+원격+충돌), 로컬모드면 로컬 저장.
async function persist(doc) {
  if (APPS()) {
    return syncSave(doc, {
      saveLocal: d => saveDoc(d),
      remoteSave: d => sharedSave(d, { url: APPS() }),
      online: online(),
    })
  }
  await saveDoc({ ...doc, sync: 'local' })
  return { ok: true, rev: doc.rev }
}

// 홈 목록: 온라인+URL이면 공유 목록을 로컬에 병합, 아니면 로컬만. 항상 전체 로컬 반환.
async function loadDocs() {
  if (online() && APPS()) {
    const r = await sharedList({ url: APPS() })
    if (r.ok) {
      for (const meta of r.docs) {
        const local = await getDoc(meta.docId)
        // 로컬에 미전송/충돌 작업이 있으면 원격 메타로 덮지 않음(내 변경 손실 방지).
        if (local && (local.sync === 'pending' || local.sync === 'conflict')) continue
        // 로컬 rev가 더 크면(=아직 안 올라간 최신) 덮지 않음.
        if (local && (local.rev || 0) > (meta.rev || 0)) continue
        await saveDoc({ ...(local || {}), ...meta, sync: 'synced' })
      }
    }
  }
  return listAll()
}
function bytesToBase64(bytes) { let s = ''; for (let i = 0; i < bytes.length; i++) s += String.fromCharCode(bytes[i]); return btoa(s) }

// 템플릿/폰트는 최초 1회 로드 후 캐시
const _assets = {}
async function loadAssets(formId) {
  if (!_assets._font) _assets._font = new Uint8Array(await fetch('./fonts/NanumGothic-Regular.ttf').then(r => r.arrayBuffer()))
  if (!_assets[formId]) _assets[formId] = new Uint8Array(await fetch(`./templates/${formId}.pdf`).then(r => r.arrayBuffer()))
  return { templateBytes: _assets[formId], fontBytes: _assets._font }
}
function downloadPdf(bytes, fileName) {
  const blob = new Blob([bytes], { type: 'application/pdf' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url; a.download = `${fileName || 'document'}.pdf`
  document.body.appendChild(a); a.click(); a.remove()
  setTimeout(() => URL.revokeObjectURL(url), 2000)
}
async function renderPdf(doc) {
  const def = FORMS[doc.formId]
  const { templateBytes, fontBytes } = await loadAssets(doc.formId)
  return renderPdfCore({ templateBytes, fontBytes, formId: doc.formId, def, values: doc.values })
}

function showHome() {
  branchBadge.textContent = getConfig().branch
  document.getElementById('topTitle').textContent = 'SkyPatrol'
  backBtn.style.display = 'none'; savebar.hidden = true
  home.classList.add('active'); formScreen.classList.remove('active')
  renderHome(home, { loadDocs, shared: !!APPS() }).then(bindHome)
}

function bindHome() {
  home.querySelectorAll('[data-open]').forEach(b => b.addEventListener('click', () => openForm(b.dataset.open)))
  home.querySelectorAll('.open-doc').forEach(s => {
    const row = s.closest('[data-id]')
    s.addEventListener('click', () => openForm(null, row.dataset.id))
  })
}

let cur = null // 현재 편집 중 문서 메타 {docId?, status, rev}

async function openForm(formId, existingId) {
  let doc = null
  if (existingId) {
    // 공유모드면 최신을 원격에서 로드(다른 사람 변경 반영), 아니면 로컬.
    if (online() && APPS()) { const r = await sharedGet(existingId, { url: APPS() }); if (r.ok) doc = r.doc }
    if (!doc) doc = await getDoc(existingId)
  }
  const def = FORMS[formId || doc?.formId]
  if (!def) return
  cur = { docId: doc?.docId, status: (doc?.status) || STATUS.DRAFT, rev: doc?.rev || 0 }
  document.getElementById('topTitle').textContent = def.title
  backBtn.style.display = 'flex'
  home.classList.remove('active'); formScreen.classList.add('active')
  const { el, collect } = renderForm(def, doc?.values || {}, { stage: 'input' })
  formScreen.innerHTML = ''; formScreen.appendChild(el)
  wireAgency(el, def, doc)
  buildSavebar(def, collect, doc)
}

function wireAgency(el, def, doc) {
  const agencySel = el.querySelector('[data-key="agency"] select')
  const monthInp = el.querySelector('[data-key="month"] input')
  const roundInp = el.querySelector('[data-key="round"] input')
  if (agencySel && monthInp && roundInp) {
    const suggestRound = async () => {
      if (!agencySel.value) return
      const docs = await listByAgencyForm(agencySel.value, def.id)
      roundInp.value = nextRound(docs.filter(d => d.docId !== doc?.docId).map(d => d.values), Number(monthInp.value))
    }
    agencySel.addEventListener('change', suggestRound)
    monthInp.addEventListener('change', suggestRound)
  }
  if (agencySel) {
    agencySel.addEventListener('change', () => {
      const defaults = resolveAgencyDefaults(def, agencySel.value)
      for (const k in defaults) {
        const inp = el.querySelector(`[data-key="${k}"] input`)
        if (inp && defaults[k]) inp.value = defaults[k]
      }
    })
  }
}

const ACTIONS = {
  [STATUS.DRAFT]:   { action: 'submit', label: '확인자에게 넘김', cls: 'go' },
  [STATUS.CONFIRM]: { action: 'confirmSign', label: '총괄에게 넘김', cls: 'go' },
  [STATUS.APPROVE]: { action: 'approve', label: '완료 (PDF 생성)', cls: 'done' },
  [STATUS.DONE]:    { action: 'revert', label: '되돌리기 (수정)', cls: 'revert' },
}

function buildSavebar(def, collect, doc) {
  savebar.hidden = false; savebar.innerHTML = ''
  const { el: saveBtn, setState } = createSaveButton(() => doSave(def, collect, doc, setState))
  savebar.appendChild(saveBtn)
  const act = ACTIONS[cur.status]
  if (act) {
    const b = document.createElement('button')
    b.type = 'button'; b.className = 'act-btn ' + act.cls; b.textContent = act.label
    b.addEventListener('click', () => doAction(def, collect, doc, act.action))
    savebar.appendChild(b)
  }
  const viewBtn = document.createElement('button')
  viewBtn.type = 'button'; viewBtn.className = 'act-btn pdf'; viewBtn.textContent = '뷰어'
  viewBtn.addEventListener('click', () => viewPdf(def, collect, doc))
  savebar.appendChild(viewBtn)
  if (canSaveFinalPdf(cur.status)) {
    const saveBtn = document.createElement('button')
    saveBtn.type = 'button'; saveBtn.className = 'act-btn pdf'; saveBtn.textContent = 'PDF저장'
    saveBtn.addEventListener('click', () => downloadFinalPdf(def, collect, doc))
    savebar.appendChild(saveBtn)
  }
}

function buildDoc(def, v, doc) {
  const yy = (v.inspectDate || new Date().toISOString().slice(0, 10)).slice(0, 4)
  const meta = buildDocMeta(def, v, cur.docId || doc?.docId, yy)
  cur.docId = meta.docId
  return {
    docId: meta.docId, formId: def.id, branch: getConfig().branch, agency: meta.agency,
    fileName: meta.fileName, status: cur.status, rev: cur.rev,
    values: { ...(doc?.values || {}), ...v }, savedAt: now(),
  }
}

async function doSave(def, collect, doc, setState) {
  // 완료된 문서는 조용히 값만 바뀌면 PDF와 어긋나므로, 수정은 '되돌리기'를 먼저.
  if (cur.status === STATUS.DONE) { alert("완료된 문서입니다. 수정하려면 먼저 '되돌리기(수정)'를 눌러주세요."); return }
  const v = collect()
  const meta = buildDocMeta(def, v, cur.docId || doc?.docId, '0')
  if (!meta.byBranch && !v.agency) { alert('대리점을 선택하세요'); return }
  setState('uploading')
  const r = await persist(buildDoc(def, v, doc))
  if (r.conflict) { setState('error'); alert('다른 사람이 먼저 수정했습니다. 새로고침 후 다시 저장하세요.'); return }
  cur.rev = r.rev ?? cur.rev
  setState('done'); setTimeout(showHome, 700)
}

// 상태 넘김/완료/되돌리기. 완료(done)면 PDF 생성(로컬모드는 다운로드).
async function doAction(def, collect, doc, action) {
  const v = collect()
  const meta = buildDocMeta(def, v, cur.docId || doc?.docId, '0')
  if (!meta.byBranch && !v.agency) { alert('대리점을 선택하세요'); return }
  const built = buildDoc(def, v, doc)
  built.status = nextStatus(built.status, action)
  if (built.status === STATUS.DONE) {
    try {
      const bytes = await renderPdf(built)
      built.pdfBase64 = bytesToBase64(bytes)
      if (!APPS()) downloadPdf(bytes, built.fileName)
    } catch { alert('PDF 생성 실패'); return }
  }
  const r = await persist(built)
  if (r.conflict) { alert('다른 사람이 먼저 수정했습니다. 새로고침 후 다시 시도하세요.'); return }
  showHome()
}

// 뷰어: 현재 값으로 PDF를 렌더해 새 탭에서 미리보기만(저장 없음).
// 창은 클릭 즉시 열어야(동기) 모바일 팝업 차단을 피한다 — 렌더 후 location 설정.
async function viewPdf(def, collect, doc) {
  const w = window.open('', '_blank')
  const built = buildDoc(def, collect(), doc)
  const bytes = await renderPdf(built)
  const blob = new Blob([bytes], { type: 'application/pdf' })
  const url = URL.createObjectURL(blob)
  if (w) w.location = url
  else window.open(url, '_blank') // 팝업이 이미 차단됐으면 최후 시도
  setTimeout(() => URL.revokeObjectURL(url), 60000)
}
// 최종 PDF 저장: 서명 완료 단계에서 공식 PDF를 기기로 다운로드(그룹웨어 첨부용).
async function downloadFinalPdf(def, collect, doc) {
  const built = buildDoc(def, collect(), doc)
  downloadPdf(await renderPdf(built), built.fileName)
}

// 오프라인 중 쌓인 pending 문서를 연결 시 자동 업로드(공유모드에서만).
async function flushQueue() {
  if (!online() || !APPS()) return
  await flushPending({
    listPending: () => listBySync('pending'),
    remoteSave: d => sharedSave(d, { url: APPS() }),
    saveLocal: d => saveDoc(d),
  })
}
// 재연결 시 pending 전송. 단, 편집 중(폼 화면)이면 홈으로 튕기지 않음(입력 유실 방지).
window.addEventListener('online', () => { flushQueue().then(() => { if (home.classList.contains('active')) showHome() }) })

// 해시(#지사)만 바꾸면 브라우저가 새로고침을 안 하므로, 지사 링크로 바뀌면 리로드해 boot()이 다시 적용하게 함.
window.addEventListener('hashchange', () => { if (resolveBranchLink(location.hash, BRANCH_LINKS)) location.reload() })
backBtn.addEventListener('click', showHome)
window.addEventListener('load', () => { if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{}) })

async function purgeExpiredLocal() {
  try {
    const ids = expiredDocIds(await listAll(), Date.now())
    for (const id of ids) await deleteDoc(id)
  } catch { /* purge 실패는 치명적 아님 */ }
}
async function boot() {
  // 지사 별칭 링크(#daegu 등)로 열면 그 지사·저장소 URL로 전환·저장. 해시 없으면 기존 설정 유지.
  const link = resolveBranchLink(location.hash, BRANCH_LINKS)
  if (link) setConfig({ branch: link.branch, APPS_SCRIPT_URL: link.api })
  await purgeExpiredLocal()
  if (online() && APPS()) {
    try { await loadRoster({ url: APPS() }) } catch { /* 실패해도 캐시/placeholder로 진행 */ }
  }
  showHome()
  flushQueue()
}
boot()
</script>
</body>
</html>
